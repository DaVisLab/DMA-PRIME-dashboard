[project]
name = "dma_prime_vis_toolkit"
version = "1.3.7"
description = "DMA-PRIME December 2024"
dependencies = [
    "waitress",
    "flask<2.4",
    "flask-bcrypt",

    "mysqlclient",

    "pandas",
    "openpyxl",
    "numpy",
    "geojson",

    "requests",

    "google-api-python-client",
    "google-auth",
    "google-auth-oauthlib",
    "google-auth-httplib2",
]

[build-system]
requires = ["flit_core<4"]
build-backend = "flit_core.buildapi"