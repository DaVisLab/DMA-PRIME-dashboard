<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DMA-PRIME</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@shoelace-style/shoelace@2.15.1/cdn/themes/light.css" />
    <script type="module" src="https://cdn.jsdelivr.net/npm/@shoelace-style/shoelace@2.15.1/cdn/shoelace-autoloader.js"></script>

    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='css/style.css') }}" />
    <!-- <script src="https://d3js.org/d3-collection.v1.min.js"></script> -->
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/d3-geo@3"></script><!-- <link rel="preconnect" href="https://fonts.googleapis.com" /> -->
    <!-- <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin /> -->
    <!-- <link
      href="https://fonts.googleapis.com/css2?family=Josefin+Sans:ital,wght@0,100..700;1,100..700&display=swap"
      rel="stylesheet"
    /> -->
  </head>
  <body>
    <!-- Top nav bar -->
    <sl-tab-group id="navBar">
        <sl-tab slot="nav" panel="county">County</sl-tab>
        <sl-tab slot="nav" panel="zip">Zip Code</sl-tab>
        <!-- <sl-tab slot="nav" panel="block">Census Block</sl-tab> -->
        <!-- <sl-tab slot="nav" panel="disabled" disabled>Disabled</sl-tab> -->
    </sl-tab-group>
    <!-- Main content -->
    <sl-split-panel position="20" id="mainContent">
        <div slot="divider" id="mainContentDivider"><sl-icon-button name="chevron-compact-left" id="hideOptionsButton"></sl-icon-button></div>
        <div slot="start" id="options" >
          <sl-radio-group id="visSelector" name="visSelector" value="none">
            <label>Select a visualization</label>
            <sl-radio value="none">None</sl-radio>
            <sl-radio value="aggregated" >Aggregated</sl-radio>
            <sl-radio value="3" disabled>Option 3</sl-radio>
          </sl-radio-group>
        </div>
        <div slot="end" id="mainVisDiv" >
            <svg id="mainVis" ></svg>
        </div>
    </sl-split-panel>

    <script src="{{ url_for('static', filename='js/main-vis.js') }}"></script>
    <script src="{{ url_for('static', filename='js/interactions.js') }}"></script>
    <script>
      displayMap("{{ url_for('static', filename='data/tl_2023_sc_county.json') }}");
    </script>

  </body>
</html>
