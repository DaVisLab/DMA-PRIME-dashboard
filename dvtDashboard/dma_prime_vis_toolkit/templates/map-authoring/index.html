<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>map authoring</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/map-authoring/vendor/bootstrap.min.css') }}"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/map-authoring/map-authoring/map-authoring.css') }}"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/map-authoring/map-authoring/bubble-map.css') }}"
    />
  </head>
  <body>
    <div class="map-authoring-shell">
      <nav class="navbar navbar-expand-lg navbar-light bg-light app-navbar">
        <div class="container-fluid">
          <div class="app-brand-controls">
            <a class="navbar-brand app-title" href="#">Map Authoring Demo</a>
          </div>

          <button
            class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#main-navigation"
            aria-controls="main-navigation"
            aria-expanded="false"
            aria-label="Toggle navigation"
          >
            <span class="navbar-toggler-icon"></span>
          </button>
        </div>
      </nav>

      <main class="app-page">
        <section
          id="authoring-tab-workspace"
          class="authoring-tab-workspace"
          aria-label="map authoring workspace"
        >
          <header class="authoring-tab-bar">
            <div
              id="authoring-tab-list"
              class="authoring-tab-list"
              role="tablist"
              aria-label="workspace views"
            ></div>
            <div class="authoring-tab-actions">
              <!-- <button
                id="rename-authoring-tab"
                class="authoring-tab-action"
                type="button"
                aria-label="Rename selected tab"
              >
                rename
              </button> -->
              <!-- <button
                id="save-authoring-tab-json"
                class="authoring-tab-action"
                type="button"
                aria-label="Save current tab JSON"
              >
                save
              </button>
              <button
                id="load-authoring-tab-json"
                class="authoring-tab-action"
                type="button"
                aria-label="Load tab JSON"
              >
                load
              </button> -->
              <input
                id="load-authoring-tab-file"
                class="visually-hidden"
                type="file"
                accept="application/json,.json"
              />
              <button
                id="add-authoring-tab"
                class="authoring-tab-action authoring-tab-add"
                type="button"
                aria-label="Add tab"
              >
                +
              </button>
            </div>
          </header>

          <div id="authoring-tab-panels" class="authoring-tab-panels">
            <section
              id="authoring-workspace-1"
              class="app-tab-pane authoring-workspace-pane"
              data-authoring-workspace-panel
              data-tab-title="Workspace 1"
              aria-label="map authoring workspace"
            >
              <div class="page-content-row">
                <section class="app-map-panel" aria-label="map authoring canvas">
                  <div class="map-view-area">
                    <div class="context-menu" data-context-menu></div>
                    <svg
                      class="vis-container"
                      data-map-svg
                      aria-label="Interactive bubble map canvas"
                    ></svg>
                    <div
                      class="map-loading-status"
                      data-map-loading-status
                      role="status"
                      hidden
                    ></div>
                  </div>
                </section>

                <aside
                  class="option-panel app-side-panel"
                  data-annotation-panel
                  aria-label="annotation panel"
                ></aside>
              </div>
            </section>
          </div>
        </section>
      </main>
    </div>

    <script>
      window.mapAuthoringConfig = {{ metadata | tojson }};
    </script>
    <script src="{{ url_for('static', filename='js/map-authoring/vendor/d3.min.js') }}"></script>
    <script src="{{ url_for('static', filename='js/map-authoring/vendor/bootstrap.bundle.min.js') }}"></script>
    <script
      type="module"
      src="{{ url_for('static', filename='js/map-authoring/map-authoring/app.js') }}"
    ></script>
  </body>
</html>
