{% extends "subtemplates/panel.html" %}

{% block options %}
<div id="map-options" class="sidebar-container">
  <!-- reset map button (zoom & zcta selection) -->
  <sl-button pill id="map-reset-button" class="center-self">Reset Map</sl-button>
  <sl-divider class="options-divider"></sl-divider>

  <!-- count vs rate switch -->
  <sl-radio-group value="count" id="map-rate-switch" class="center-self" size="small">
    <sl-tooltip content="Count of hospitalizations">
      <sl-radio-button pill value="count">Count</sl-radio-button>
    </sl-tooltip>
    <sl-tooltip content="Hospitalizations per 1000 people">
      <sl-radio-button pill value="rate">Rate</sl-radio-button>
    </sl-tooltip>
  </sl-radio-group>

  <!-- disease selector -->
   <!-- TODO: make this a loop -->
  <sl-select value="mycoplasma-pneumoniae" id="map-disease-selector" class="fill-width">
    <p slot="label">Select a disease or group of diseases</p>
    <sl-option value="mycoplasma-pneumoniae">Mycoplasma Pneumoniae</sl-option>
  </sl-select>
  
  
  <sl-divider class="options-divider"></sl-divider>
  <!-- map icon inclusion checkboxes (hospital, mobile health clinic, community partners) -->
  <!-- <sl-checkbox id="map-options-hospital-icons-toggle" class="map-icons-toggle" style="display: initial;">Hospitals</sl-checkbox>
  <sl-checkbox id="map-options-mobile-clinic-icons-toggle" class="map-icons-toggle" style="display: initial;">Mobile Health Clinics</sl-checkbox>
  <sl-checkbox id="map-options-community-partner-icons-toggle" class="map-icons-toggle" style="display: initial;">Community Partners</sl-checkbox> -->
</div>

<sl-resize-observer id="aggregated-disease-history-resizer">
  <div id="aggregated-disease-history-container" class="fill-width">
    <p id="aggregated-disease-history-title">State Wide Disease Encounters</p>
    <svg id="aggregated-disease-history"></svg>
  </div>
</sl-resize-observer>
{% endblock %}

{% block contents %}
<div class="fill-width fill-height" id="map-div">
</div>
<div id="choropleth-legend" style="position:absolute; bottom: 0; left:0;">
  <svg id="choropleth-legend-svg"></svg>
</div>
{% endblock %}

{% block scripts %}
<script>

  mapResetButton = document.getElementById("map-reset-button")
  mapRateSwitch = document.getElementById("map-rate-switch")

  mapDiseaseSelector = document.getElementById("map-disease-selector")

  aggregatedDiseaseHistoryResizer = document.getElementById("aggregated-disease-history-resizer")
  aggregatedDiseaseHistoryContainer = document.getElementById("aggregated-disease-history-container")
  aggregatedDiseaseHistory = document.getElementById("aggregated-disease-history")

  mapDiv = document.getElementById("map-div")
  choroplethLegendSVG = document.getElementById("choropleth-legend-svg")

  mapMainContent = document.getElementById("map-main-content")
  mapMainContent.primary = "start"
  
//   hospitalIconsToggle = document.getElementById("map-options-hospital-icons-toggle")
//   cdapIconsToggle = document.getElementById("map-options-cdap-toggle")
//   mobileClinicIconsToggle = document.getElementById("map-options-mobile-clinic-icons-toggle")
//   communityPartnerIconsToggle = document.getElementById("map-options-community-partner-icons-toggle")
//   checked = []

  set{{panel.name}}Panel()
</script>

<script src="{{ url_for('static', filename='js/state-disease-data/map.js') }}" type="module"></script>
<script src="{{ url_for('static', filename='js/state-disease-data/map-interactions.js') }}" type="module"></script>

{% endblock %}
