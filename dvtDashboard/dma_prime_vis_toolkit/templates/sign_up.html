<!DOCTYPE html>
<html lang="en" class="sl-theme-dark">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, maximum-scale=1.0" />

  <title>{% block title %}DMA-PRIME{% endblock %}</title>

  <!-- Shoelace -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@shoelace-style/shoelace@2.15.1/cdn/themes/dark.css" />
  <script type="module"
    src="https://cdn.jsdelivr.net/npm/@shoelace-style/shoelace@2.15.1/cdn/shoelace-autoloader.js"></script>

  <!-- D3 -->
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/d3-geo@3"></script>

  <!-- Style that should load before the rest of the page -->
  {% block style %}
  <style>
    header {
      background-color: #333; /* Dark background */
      position: fixed; /* Sticks to the top */
      top: 0;
      left: 0;
      width: 100%; /* Full width */
      display: flex;
      align-items: center; /* Align icons vertically /*
      z-index: 1000; /* Keeps it above other content */
      height: 60px; /* Define a fixed height */
    }

    nav {
      /* display: flex; */
      width: 100%;
      align-items: center;
    }

    sl-icon-button{
      font-size: 2rem;
    }

    body {
        width: 100vw;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        margin: 0px;
        padding: 0px;
    }

    #form-div {
        height: fit-content;
        width: 30%;
        font-family: var(--sl-font-sans); 
    }

    #login-title {
      margin-bottom: var(--sl-spacing-2x-large)
    }

    #username {
      margin-bottom: var(--sl-spacing-small)
    }

    #password {
      margin-bottom: var(--sl-spacing-2x-small)
    }

    #password_message {
      margin-bottom: var(--sl-spacing-2x-small);
    }

    #signup-error {
      height: 1em;
      margin-top: 0;
      margin-bottom: var(--sl-spacing-x-large)
    }

  </style>
  {% endblock %}

  <!-- code that should run before the rest of the page -->
  {% block headScripts %}
  {% endblock %}

</head>

<body>
  <header>
    <nav>
      <a href="{{ url_for('auth.login') }}">
        <sl-button id="log_in" style="float: right; font-size: 2rem; margin-top: 3px; margin-right: 6px; align-items: center;" size="medium">
        Login
        </sl-button>
      </a>
    </nav>
  </header>

  <div id="form-div">
    <h1 id="login-title">Sign Up</h1>
    <form method="post" id="signup-form">
      <sl-input label="Username" id="username" name="username" required></sl-input>
      <sl-input label="Email" type="email" id="email" name="email" required></sl-input>
      <sl-input label="Password" pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z]).{8,}" type="password" name="password" id="password-input" password-toggle required></sl-input>
      <div id="pwd_message">
        <h3>Password must contain the following:</h3>
        <p id="letter" class="invalid">A <b>lowercase</b> letter</p>
        <p id="capital" class="invalid">A <b>capital (uppercase)</b> letter</p>
        <p id="number" class="invalid">A <b>number</b></p>
        <p id="length" class="invalid">Minimum <b>8 characters</b></p>
      </div>
      <p id="signup-error"> 
        <!-- if there is an error passed through flask, display it -->
        {% for message in get_flashed_messages() %}
        <text>{{ message }}</text>
        {% endfor %}
      </p>
      <sl-button type="submit" variant="primary">Submit</sl-button>
    </form>
  </div>

  

</body>

</html>
