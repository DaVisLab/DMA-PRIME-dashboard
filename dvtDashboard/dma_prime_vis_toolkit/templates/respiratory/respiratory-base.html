{% extends "subtemplates/base.html" %} {% block title %}DMA-PRIME{% endblock %}
{% block style %}
<!-- Linking stylesheets -->
<link
  rel="stylesheet"
  type="text/css"
  href="{{ url_for('static', filename='css/style.css') }}"
/>
<link
  rel="stylesheet"
  type="text/css"
  href="{{ url_for('static', filename='css/respiratory/respiratory-style.css') }}"
/>
<link
  rel="stylesheet"
  type="text/css"
  href="{{ url_for('static', filename='css/respiratory/map-style.css') }}"
/>
<link
  rel="stylesheet"
  type="text/css"
  href="{{ url_for('static', filename='css/respiratory/grid-style.css') }}"
/>
{% endblock %} {% block headScripts %}
<!-- Adding datetime package timejs (allows timezone date instantiation) -->
<script src="https://cdn.jsdelivr.net/npm/dayjs@1/dayjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dayjs@1/plugin/utc.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dayjs@1/plugin/customParseFormat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dayjs@1/plugin/isSameOrAfter.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dayjs@1/plugin/isSameOrBefore.js"></script>

<script>
  // Ensuring the timejs additional plugins are linked
  dayjs.extend(window.dayjs_plugin_utc);
  dayjs.extend(window.dayjs_plugin_customParseFormat);
  dayjs.extend(window.dayjs_plugin_isSameOrAfter);
  dayjs.extend(window.dayjs_plugin_isSameOrBefore);

  // South Carolina population baseline used by state-level rate charts.
  var scPopulation = 5118425;
</script>
<!-- Contains helper functions/data/constants -->
<script>
  function parseDate(dateString) {
    return dayjs(dateString, "YYYY-MM-DD").toDate()
  }
  var metadata = {{ metadata | tojson }}

  var currentDate = parseDate(metadata.current_date)

  var firstDate = parseDate(metadata.first_date)
  var allHistoricalDates = metadata.all_historical_dates.map(d => parseDate(d))
  var expectedAllHistoricalDataPoints = allHistoricalDates.length

  var startShortHistory = parseDate(metadata.start_short_history)
  var shortHistoryDates = metadata.short_history_dates.map(d => parseDate(d))
  var expectedShortHistoryDataPoints = shortHistoryDates.length

  var lastDate = parseDate(metadata.last_date)
  var predictionDates = metadata.prediction_dates.map(d => parseDate(d))
</script>
<script
  src="{{ url_for('static', filename='js/respiratory/script.js') }}"
  type="module"
></script>

{% endblock %} {% block linkout %}

{% endblock %} {% block extraBody %}
<sl-dialog id="tooltip-large" class="dialog-width">
  <sl-icon-button
    name="info-circle"
    slot="header-actions"
    id="model-exploration-button-tooltip-large"
  ></sl-icon-button>
  <div>
    <div class="tooltip-header">
      <div class="tooltip-region-info"></div>
      <div class="tooltip-data-info"></div>
    </div>
    <sl-resize-observer id="tooltip-large-resizer">
      <svg id="tooltip-large-svg" class="tooltip-outer-svg"></svg>
    </sl-resize-observer>
    <div class="tooltip-footer">
      <div class="tooltip-legend"></div>
      <div class="tooltip-options"></div>
    </div>
  </div>
</sl-dialog>
{% endblock %} {% block bodyScripts %}
<script>
  var tooltipLarge = document.getElementById("tooltip-large");
  function clearLargeTooltipContent() {
    tooltipLarge
      .querySelectorAll(
        ".tooltip-region-info, .tooltip-data-info, .tooltip-legend, .tooltip-options, #tooltip-large-svg",
      )
      .forEach((node) => (node.innerHTML = ""));
  }
  tooltipLarge.addEventListener("sl-after-hide", clearLargeTooltipContent);
  tooltipLarge.addEventListener("close", clearLargeTooltipContent);

  var modelExplorationButtonTooltipLarge = document.getElementById(
    "model-exploration-button-tooltip-large",
  );

  d3.select(modelExplorationButtonTooltipLarge).on("click", () => {
    d3.select(".model-exploration-icon-button").dispatch("click");
  });
</script>


<script type="module">
  // toggle tooltip labels
  document.addEventListener("keyup", function (e) {
    if (e.key == "l") {
      d3.selectAll(".tooltip-label-group").each(function (d) {
        const display =
          d3.select(this).attr("display") == "none" ? "initial" : "none";
        d3.select(this).attr("display", display);
      });
    }
  });
</script>

{% endblock %}
