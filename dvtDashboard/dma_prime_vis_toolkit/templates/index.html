<!DOCTYPE html>
<html lang="en" class="sl-theme-dark">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, maximum-scale=1.0" />

  <title>DMA-PRIME</title>

  <!-- Shoelace -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@shoelace-style/shoelace@2.15.1/cdn/themes/dark.css" />
  <script type="module"
    src="https://cdn.jsdelivr.net/npm/@shoelace-style/shoelace@2.15.1/cdn/shoelace-autoloader.js"></script>

  <style>
    body {
      margin: var(--sl-spacing-large);
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      align-items: center;
      justify-content: center;
    }

    .subpage a {
      align-items: center;
      display: flex;
      flex-direction: column;
    }

    .subpage p,a {
      font-family: var(--sl-font-sans);
      font-size: var(--sl-font-size-x-large);
      text-decoration: none;
      color: white;
    }

    .subpage sl-icon,img,embed {
      font-size: calc(min(30vw, 20vh));
      height: calc(min(30vw, 20vh));
      width: calc(min(30vw, 20vh));
    }

    /* The following is from  https://dev.to/lennythedev/css-gotcha-how-to-fill-page-with-a-div-270j*/
    /* override browser default */
    html,
    body {
      margin: 0;
      padding: 0;
    }

    /* use viewport-relative units to cover page fully */
    body {
      height: 100vh;
      width: 100vw;
    }

    /* include border and padding in element width and height */
    * {
      box-sizing: border-box;
    }
  </style>

</head>

<body>
  <div class="subpage">
    <a href="{{ url_for('respiratory') }}">
      <sl-icon name="lungs"></sl-icon>
      <p>Respiratory Infections (Covid-19, Influenza, RSV)</p>
    </a>
  </div>
  <div class="subpage">
    <a href="{{ url_for('waste_water') }}">
      <sl-icon name="droplet-half"></sl-icon>
      <p>Wastewater Monitoring</p>
    </a>
  </div>
  <div class="subpage">
    <a href="{{ url_for('other_infectious_diseases') }}">
      <sl-icon name="virus2"></sl-icon>
      <p>Other Infectious Diseases</p>
    </a>
    
  </div>
  <div class="subpage">
    <a href="{{ url_for('opioid_hcv_hiv') }}">
      <img src="{{ url_for('static', filename='assets/Icons/syringe-1309-svgrepo-com.svg') }}"></img>
      <p>Opioid Overdose and HCV and HIV Hospitalizations</p>
    </a>
  </div>
  <div class="subpage">
    <a href="{{ url_for('mobile_health_clinics') }}">
      <img src="{{ url_for('static', filename='assets/Icons/mobile_health_clinic.svg') }}"></img>
      <p>Mobile Health Clinic Tracking</p>    
    </a>
  </div>
</body>

</html>
